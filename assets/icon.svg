<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" fill="none">
  <title>aios-sdlc icon</title>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="#0F172A" />

  <!-- Constellation -->
  <g transform="translate(64, 64)">
    <!-- Connection lines (all subtle) -->
    <g stroke="#475569" stroke-width="1.5" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-36" />
      <line x1="0" y1="0" x2="31" y2="-18" />
      <line x1="0" y1="0" x2="31" y2="18" />
      <line x1="0" y1="0" x2="0" y2="36" />
      <line x1="0" y1="0" x2="-31" y2="18" />
      <line x1="0" y1="0" x2="-31" y2="-18" />
    </g>

    <!-- Active connections (parallel dispatch — top three) -->
    <g stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-36" />
      <line x1="0" y1="0" x2="31" y2="-18" />
      <line x1="0" y1="0" x2="-31" y2="-18" />
    </g>

    <!-- Agent nodes -->
    <g fill="#E2E8F0">
      <circle cx="0" cy="-36" r="6.5" />
      <circle cx="31" cy="-18" r="6.5" />
      <circle cx="31" cy="18" r="6.5" />
      <circle cx="0" cy="36" r="6.5" />
      <circle cx="-31" cy="18" r="6.5" />
      <circle cx="-31" cy="-18" r="6.5" />
    </g>

    <!-- Orchestrator center -->
    <circle cx="0" cy="0" r="13" fill="#F59E0B" />
  </g>
</svg>
